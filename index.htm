<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Clock, RK, Maze & Letter Game</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #38bdf8;
            --text-color: #ffffff;
            --ring-outer-color: rgba(56, 189, 248, 0.2);
            --ring-inner-color: rgba(56, 189, 248, 0.2);
            --glow: 0 0 15px rgba(56, 189, 248, 0.6);
            --glass: rgba(255, 255, 255, 0.05);
            --exit-mint: #52F2E2;
            --mint: #52F2E2;
            --orange: #F67B28;
        }

        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
        }

        .mobile-screen {
            width: 100vw;
            height: 100vh;
            max-width: 393px; 
            max-height: 852px; 
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        /* View Management */
        .view { display: none; width: 100%; height: 100%; position: absolute; inset: 0; flex-direction: column; }
        .view.active { display: flex; }

        /* --- CLOCK STYLES --- */
        .clock-section { position: absolute; top: -60px; left: -80px; width: 350px; height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .time-display { font-size: 3rem; margin-bottom: 10px; font-weight: 800; color: var(--accent); text-shadow: var(--glow); transform: translate(230px, 90px); }
        .clock-container { position: relative; width: 350px; height: 350px; display: flex; justify-content: center; align-items: center; }
        .pointers { position: absolute; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; box-sizing: border-box; z-index: 10; pointer-events: none; }
        .arrow-outer { position: absolute; right: -35px; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-right: 18px solid var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
        .arrow-inner { position: absolute; left: 225px; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 18px solid var(--accent); filter: drop-shadow(0 0 5px var(--accent)); }
        .ring { position: absolute; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: grab; transition: transform 0.1s linear; user-select: none; background: rgba(255, 255, 255, 0.02); }
        #outer-ring { width: 350px; height: 350px; border: 4px solid var(--ring-outer-color); box-shadow: inset 0 0 15px rgba(250,250,250,1); }
        #inner-ring { width: 250px; height: 250px; border: 4px solid var(--ring-inner-color); box-shadow: inset 0 0 15px rgba(0,0,0,1); }
        .number { position: absolute; width: 30px; height: 30px; text-align: center; line-height: 30px; font-weight: 600; font-size: 1.5rem; color: #94a3b8; }

        /* --- SNOOZE BUTTON --- */
        #snooze-btn {
            position: absolute;
            left: 260px;
            top: 290px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.8rem;
            color: white;
            transition: all 0.3s ease;
            z-index: 20;
            text-transform: uppercase;
        }
        /* State 0: Off (Grey) */
        .snooze-off { background: #475569; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        /* State 1: Dim Orange */
        .snooze-dim { background: #9a4a18; box-shadow: 0 0 20px #F67B28; }
        /* State 2: Bright Orange */
        .snooze-bright { background: #F67B28; box-shadow: 0 0 40px #F67B28, 0 0 60px rgba(246, 123, 40, 0.4); }

        /* --- LOCK STYLES --- */
        .lock-section { position: absolute; bottom: -50px; right: -50px; width: 320px; height: 320px; transition: filter 0.3s ease; }
        #lock-svg { width: 100%; height: 100%; transform: rotate(-105deg); overflow: visible; }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 19; }
        .ring-progress { fill: none; stroke: var(--accent); stroke-width: 14; stroke-linecap: round; filter: drop-shadow(0 0 5px var(--accent)); }
        .finish-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #64748b; font-family: serif; font-style: italic; font-size: 1.4rem; pointer-events: none; }

        /* --- SHARED HEADER --- */
        .header {
            height: 60px;
            background: var(--glass);
            border-bottom: 1px solid var(--ring-inner-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            flex-shrink: 0;
        }
        .stats { color: var(--accent); text-shadow: var(--glow); font-weight: 800; font-size: 1.1rem; }

        /* --- RK GAME --- */
        #game-grid {
            flex-grow: 1;
            display: grid;
            grid-template-rows: repeat(22, 1fr);
            padding: 5px 10px;
            overflow: hidden;
            background: #0b1120;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #1e293b;
            font-size: 1.7rem;
            letter-spacing: 2px;
        }
        .char { cursor: pointer; user-select: none; }
        .target { color: #0f172a; }

        /* --- MAZE GAME --- */
        #view-maze { display: none; flex-direction: column; }
        #view-maze.active { display: flex; }
        #game-canvas { flex-grow: 1; width: 100%; background: #0b1120; display: block; }

        /* --- LETTER GAME STYLES --- */
        .letter-header {
            height: 80px;
            background: var(--glass);
            border-bottom: 1px solid var(--ring-inner-color);
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }
        .target-word {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        .grid-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 4px;
            padding: 15px;
            background: #0b1120;
        }
        .letter {
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(56, 189, 248, 0.4);
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 8px;
            background: var(--glass);
            transition: all 0.2s ease;
            user-select: none;
            cursor: pointer;
        }
        .letter.active {
            color: #fff;
            background: rgba(82, 242, 226, 0.2);
            box-shadow: 0 0 15px var(--mint), inset 0 0 10px var(--mint);
            text-shadow: 0 0 5px #fff;
            border: 1px solid var(--mint);
        }
        .letter.error {
            box-shadow: 0 0 15px var(--orange);
            border: 1px solid var(--orange);
            color: var(--orange);
        }

        /* --- OVERLAYS --- */
        #win-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .win-card {
            background: var(--glass);
            border: 1px solid var(--accent);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--glow);
        }
        .btn {
            background: var(--accent); border: none; color: #0f172a;
            padding: 10px 25px; border-radius: 50px;
            font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="mobile-screen">
    <div id="view-clock" class="view active">
        <div class="clock-section">
            <div class="time-display" id="display">12:00</div>
            <div class="clock-container">
                <div class="pointers"><div class="arrow-inner"></div><div class="arrow-outer"></div></div>
                <div id="outer-ring" class="ring"></div>
                <div id="inner-ring" class="ring"></div>
            </div>
        </div>

        <button id="snooze-btn" class="snooze-off">Snooze Off</button>

        <div class="lock-section" id="lock-zone">
            <div class="finish-label">finish</div>
            <svg viewBox="0 0 150 150" id="lock-svg">
                <circle class="ring-bg" cx="75" cy="75" r="50" />
                <circle id="progress" class="ring-progress" cx="75" cy="75" r="50" />
                <circle id="handle-halo" fill="rgba(250,250,250,0.5)" filter="blur(4px)" r="12" />
                <circle id="handle-indicator" r="9" fill="var(--accent)" stroke="white" stroke-width="1.5" />
            </svg>
        </div>
    </div>

    <div id="view-rk" class="view">
        <div class="header">
            <div class="stats">Level <span id="level-val">1</span></div>
            <div class="stats">Time <span id="rk-timer-val">0</span>s</div>
        </div>
        <div id="game-grid"></div>
    </div>

    <div id="view-maze" class="view">
        <div class="header">
            <div class="stats">Time <span id="maze-timer-val">0.0</span></div>
            <div class="stats">Attempts <span id="attempt-val">1</span></div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="view-letter" class="view">
        <div class="letter-header">
            <div class="stats">Time <span id="letter-timer-val">0</span>s</div>
            <div class="target-word" id="word-display">P E A C H Y</div>
        </div>
        <div class="grid-container" id="letter-grid"></div>
    </div>

    <div id="win-overlay">
        <div class="win-card">
            <h2 id="win-title" style="color: var(--accent); margin: 0; letter-spacing: 2px;">SUCCESS</h2>
            <p id="win-desc" style="color: #94a3b8; margin: 15px 0;">Total Time: <span id="final-total">0</span>s</p>
            <button class="btn" onclick="location.reload()">RESTART</button>
        </div>
    </div>
</div>

<script>
    /* --- SYSTEM CONTROL --- */
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const activeView = document.getElementById(viewId);
        activeView.classList.add('active');
        
        if(viewId === 'view-rk') startRK();
        if(viewId === 'view-maze') initMaze();
        if(viewId === 'view-letter') initLetterGame();
    }

    /* --- CLOCK LOGIC --- */
    const outerRing = document.getElementById('outer-ring');
    const innerRing = document.getElementById('inner-ring');
    const display = document.getElementById('display');
    let clockState = { hour: 12, minute: 0 };

    function createNumbers(ring, count, step, radius) {
        for (let i = 0; i < count; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            const val = i * step;
            num.innerText = ring.id === 'inner-ring' ? (i === 0 ? 12 : i) : (val < 10 ? '0'+val : val);
            const angle = (i * (360 / count)) * (Math.PI / 180);
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            num.style.left = `calc(50% + ${x}px - 15px)`;
            num.style.top = `calc(50% + ${y}px - 15px)`;
            ring.appendChild(num);
        }
    }
    createNumbers(outerRing, 12, 5, 150);
    createNumbers(innerRing, 12, 1, 95);

    function handleRotation(e, ring, isOuter) {
        const rect = ring.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        ring.style.transform = `rotate(${angle}deg)`;
        ring.querySelectorAll('.number').forEach(n => n.style.transform = `rotate(${-angle}deg)`);
        let normalized = (angle < 0) ? angle + 360 : angle;
        let slice = Math.round((360 - normalized) / 30) % 12;
        if (isOuter) clockState.minute = (slice * 5) % 60;
        else clockState.hour = slice === 0 ? 12 : slice;
        display.innerText = `${clockState.hour}:${clockState.minute < 10 ? '0'+clockState.minute : clockState.minute}`;
    }

    function setupRing(ring, isOuter) {
        let isDragging = false;
        const start = () => isDragging = true;
        const stop = () => {
            isDragging = false;
            const currentRotation = ring.style.transform.match(/rotate\((.*)deg\)/);
            if (currentRotation) {
                let angle = parseFloat(currentRotation[1]);
                let snapped = Math.round(angle / 30) * 30;
                ring.style.transition = 'transform 0.2s ease-out';
                ring.style.transform = `rotate(${snapped}deg)`;
                ring.querySelectorAll('.number').forEach(n => {
                    n.style.transition = 'transform 0.2s';
                    n.style.transform = `rotate(${-snapped}deg)`;
                });
                setTimeout(() => ring.style.transition = 'none', 200);
            }
        };
        const move = (e) => { if (isDragging) handleRotation(e, ring, isOuter); };
        ring.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        ring.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', stop);
    }
    setupRing(outerRing, true);
    setupRing(innerRing, false);

    /* --- SNOOZE BUTTON LOGIC --- */
    const snoozeBtn = document.getElementById('snooze-btn');
    let snoozeState = 0; // 0=Off, 1=Dim, 2=Bright

    snoozeBtn.addEventListener('click', () => {
        snoozeState = (snoozeState + 1) % 3;
        snoozeBtn.className = ''; // Reset classes
        if (snoozeState === 1) {
            snoozeBtn.classList.add('snooze-dim');
            snoozeBtn.innerText = "Snooze 1";
        } else if (snoozeState === 2) {
            snoozeBtn.classList.add('snooze-bright');
            snoozeBtn.innerText = "Snooze 2";
        } else {
            snoozeBtn.classList.add('snooze-off');
            snoozeBtn.innerText = "Snooze Off";
        }
    });

    /* --- LOCK LOGIC --- */
    const progress = document.getElementById('progress');
    const lockZone = document.getElementById('lock-zone');
    const handleIndicator = document.getElementById('handle-indicator');
    const handleHalo = document.getElementById('handle-halo');
    const lockRadius = 50; 
    const lockCenter = 75;
    const circumference = 2 * Math.PI * lockRadius;
    const gapAngle = 60;
    const initialOffset = (gapAngle / 360) * circumference;

    progress.style.strokeDasharray = circumference;
    progress.style.strokeDashoffset = initialOffset;

    function updateHandlePosition(degrees) {
        const angleRad = degrees * (Math.PI / 180);
        const x = lockCenter + lockRadius * Math.cos(angleRad);
        const y = lockCenter + lockRadius * Math.sin(angleRad);
        handleIndicator.setAttribute('cx', x);
        handleIndicator.setAttribute('cy', y);
        handleHalo.setAttribute('cx', x);
        handleHalo.setAttribute('cy', y);
    }
    updateHandlePosition(300);

    let isLockDragging = false;
    const updateLock = (e) => {
        if (!isLockDragging) return;
        const rect = lockZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let angle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        let normalized = (angle + 105 + 360) % 360;

       if (normalized >= 330 || normalized <= 10) {
            progress.style.strokeDashoffset = 0;
            updateHandlePosition(360);
            lockZone.style.filter = "brightness(1.5)"; 
            isLockDragging = false;
            setTimeout(() => showView('view-rk'), 300);
        } else if (normalized < 330) {
            let newOffset = circumference - (normalized / 360 * circumference);
            if (newOffset < initialOffset) {
                progress.style.strokeDashoffset = newOffset;
                updateHandlePosition(normalized); 
                lockZone.style.filter = "brightness(1.0)";
            }
        }
    };
    lockZone.addEventListener('mousedown', () => isLockDragging = true);
    window.addEventListener('mousemove', updateLock);
    window.addEventListener('mouseup', () => isLockDragging = false);
    lockZone.addEventListener('touchstart', (e) => { if (e.touches.length === 1) e.preventDefault(); isLockDragging = true; }, {passive: false});
    window.addEventListener('touchmove', updateLock, {passive: false});
    window.addEventListener('touchend', () => isLockDragging = false);

    /* --- RK GAME LOGIC --- */
    let rkTimer = 0, rkInterval, level = 1;
    function startRK() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = ''; 
        rkTimer = 0; 
        document.getElementById('rk-timer-val').innerText = rkTimer;
        document.getElementById('level-val').innerText = level;
        clearInterval(rkInterval);
        rkInterval = setInterval(() => { rkTimer++; document.getElementById('rk-timer-val').innerText = rkTimer; }, 1000);
        
        const rowsCount = 19, charsPerRow = 18;
        const kRow = Math.floor(Math.random() * rowsCount), kCol = Math.floor(Math.random() * charsPerRow);
        for (let r = 0; r < rowsCount; r++) {
            const rowDiv = document.createElement('div'); rowDiv.className = 'row';
            for (let c = 0; c < charsPerRow; c++) {
                const span = document.createElement('span'); span.className = 'char';
                if (r === kRow && c === kCol) {
                    span.textContent = 'K'; span.className += ' target';
                    span.onclick = function() {
                        clearInterval(rkInterval);
                        this.style.color = 'var(--accent)';
                        this.style.textShadow = 'var(--glow)';
                        setTimeout(() => showView('view-maze'), 400);
                    };
                } else {
                    span.textContent = 'R';
                    span.onclick = () => { span.style.color = '#0f172a'; };
                }
                rowDiv.appendChild(span);
            }
            grid.appendChild(rowDiv);
        }
    }

    /* --- MAZE LOGIC --- */
    const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    let scaleX, scaleY, attempts = 1, mazeInterval, startTime;
    let player = { x: 0, y: 0, radius: 40, isDragging: false };
    
    const mazeSegments = [
        [286.1, -100, 286.1, 113.6], [850, 113.6, 850, 1400], [850, 1400, -100, 1400],
        [850, 377.8, 436.8, 377.8], [436.8, 377.8, 436.8, 113.6], [436.8, 113.6, 587.7, 113.6], [587.7, 113.6, 587.7, 245.7],
        [436.8, 377.8, 436.8, 509.9], [436.8, 509.9, 286.1, 509.9], [286.1, 509.9, 286.1, 377.8], [286.1, 377.8, 135.3, 377.8], [135.3, 377.8, 135.3, 113.6],
        [436.8, 245.7, 286.1, 245.7], [587.7, 509.9, 587.7, 642.0], [587.7, 642.0, 436.8, 642.0], [436.8, 642.0, 436.8, 774.1], [436.8, 774.1, 286.1, 774.1], [286.1, 774.1, 286.1, 1038.3], [286.1, 1038.3, 587.7, 1038.3],
        [587.7, 1170.4, 587.7, 906.2], [587.7, 906.2, 436.8, 906.2], [286.1, 906.2, 135.3, 906.2], [135.3, 906.2, 135.3, 642.0], [135.3, 642.0, 286.1, 642.0],
        [135.3, 774.1, -100, 774.1], [135.3, 509.9, -100, 509.9], [135.3, 1400, 135.3, 1038.3],
        [436.8, 1400, 436.8, 1170.4], [436.8, 1170.4, 286.1, 1170.4]
    ];
    
    function initMaze() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        scaleX = canvas.width / 720;
        scaleY = canvas.height / 1280;
        resetMaze();
        clearInterval(mazeInterval);
        startTime = null;
        document.getElementById('maze-timer-val').innerText = "0.0";
        renderMaze();
    }

    function resetMaze() {
        player.x = 662 * scaleX; player.y = 84 * scaleY; player.isDragging = false;
    }

    function checkCollision(nx, ny) {
        const px = nx / scaleX, py = ny / scaleY;
        for (const [x1, y1, x2, y2] of mazeSegments) {
            const dx = x2 - x1, dy = y2 - y1, l2 = dx*dx + dy*dy;
            let t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / l2));
            if (Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy)) < 35) return true;
        }
        return false;
    }

    function renderMaze() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(56, 189, 248, 0.6)"; ctx.lineWidth = 18 * scaleX; ctx.lineCap = "round";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#52F2E2";
        ctx.beginPath(); 
        mazeSegments.forEach(s => { ctx.moveTo(s[0]*scaleX, s[1]*scaleY); ctx.lineTo(s[2]*scaleX, s[3]*scaleY); }); ctx.stroke();
        
        const ex = 62 * scaleX, ey = 1205 * scaleY, sz = 30 * scaleX;
        ctx.strokeStyle = "#52F2E2"; 
        ctx.lineWidth = 10 * scaleX;
        ctx.shadowBlur = 50;
        ctx.shadowColor = "#52F2E2";
        ctx.beginPath(); 
        ctx.moveTo(ex-sz, ey-sz); ctx.lineTo(ex+sz, ey+sz); 
        ctx.moveTo(ex+sz, ey-sz); ctx.lineTo(ex-sz, ey+sz); 
        ctx.stroke();
        
        ctx.shadowBlur = 10; ctx.shadowColor = "#F67B28";
        ctx.fillStyle = "#F67B28"; 
        ctx.beginPath(); ctx.arc(player.x, player.y, player.radius * scaleX, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; requestAnimationFrame(renderMaze);
    }

    const handleMazeMove = (e) => {
        if (!player.isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const nx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const ny = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        if (!startTime) {
            startTime = Date.now();
            mazeInterval = setInterval(() => { document.getElementById('maze-timer-val').innerText = ((Date.now() - startTime) / 1000).toFixed(1); }, 100);
        }
        if (checkCollision(nx, ny)) {
            attempts++; document.getElementById('attempt-val').innerText = attempts; resetMaze();
        } else {
            player.x = nx; player.y = ny;
            if (Math.hypot(nx - 62 * scaleX, ny - 1205 * scaleY) < 35 *scaleX) {
                clearInterval(mazeInterval);
                setTimeout(() => showView('view-letter'), 500);
            }
        }
    };

    canvas.addEventListener('mousedown', (e) => { if (Math.hypot(e.offsetX - player.x, e.offsetY - player.y) < 40) player.isDragging = true; });
    canvas.addEventListener('touchstart', (e) => { 
        const rect = canvas.getBoundingClientRect();
        if (Math.hypot(e.touches[0].clientX - rect.left - player.x, e.touches[0].clientY - rect.top - player.y) < 50) {
            e.preventDefault(); player.isDragging = true;
        }
    }, {passive:false});
    window.addEventListener('mousemove', handleMazeMove);
    window.addEventListener('touchmove', handleMazeMove, {passive:false});
    window.addEventListener('mouseup', () => player.isDragging = false);
    window.addEventListener('touchend', () => player.isDragging = false);

    /* --- LETTER GAME LOGIC --- */
    const targetWord = "PEACHY";
    let letterIndex = 0;
    let letterTimer = 0, letterInterval;
    const gridRows = 12, gridCols = 8;
    const letterGrid = document.getElementById('letter-grid');
    const winOverlay = document.getElementById('win-overlay');

    function initLetterGame() {
        letterGrid.innerHTML = '';
        letterIndex = 0;
        letterTimer = 0;
        document.getElementById('letter-timer-val').innerText = letterTimer;
        winOverlay.style.display = 'none';
        
        clearInterval(letterInterval);
        letterInterval = setInterval(() => { 
            letterTimer++; 
            document.getElementById('letter-timer-val').innerText = letterTimer; 
        }, 1000);
        
        const isVertical = Math.random() > 0.5;
        const startR = Math.floor(Math.random() * (isVertical ? (gridRows - 6) : gridRows));
        const startC = Math.floor(Math.random() * (isVertical ? gridCols : (gridCols - 6)));
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        
        for (let r = 0; r < gridRows; r++) {
            for (let c = 0; c < gridCols; c++) {
                const cell = document.createElement('div');
                cell.className = 'letter';
                let char = '';
                let isPartOfWord = false;
                let wordIdx = -1;

                if (isVertical && c === startC && r >= startR && r < startR + 6) {
                    wordIdx = r - startR;
                    char = targetWord[wordIdx];
                    isPartOfWord = true;
                } else if (!isVertical && r === startR && c >= startC && c < startC + 6) {
                    wordIdx = c - startC;
                    char = targetWord[wordIdx];
                    isPartOfWord = true;
                } else {
                    char = letters[Math.floor(Math.random() * letters.length)];
                }

                cell.innerText = char;
                cell.dataset.char = char;
                cell.dataset.index = isPartOfWord ? wordIdx : -1;
                cell.onclick = () => handleLetterTap(cell);
                letterGrid.appendChild(cell);
            }
        }
    }

    function handleLetterTap(el) {
        const char = el.dataset.char;
        const wordIdx = parseInt(el.dataset.index);

        if (char === targetWord[letterIndex] && wordIdx === letterIndex) {
            el.classList.add('active');
            letterIndex++;
            if (letterIndex === targetWord.length) {
                clearInterval(letterInterval);
                const finalMazeTime = parseFloat(document.getElementById('maze-timer-val').innerText) || 0;
                const totalTime = (rkTimer + finalMazeTime + letterTimer).toFixed(1);
                
                document.getElementById('win-title').innerText = "PEACHY!";
                document.getElementById('final-total').innerText = totalTime;
                document.getElementById('win-desc').innerHTML = `Total Time: <span id="final-total">${totalTime}</span>s`;
                
                setTimeout(() => { winOverlay.style.display = 'flex'; }, 300);
            }
        } else if (!el.classList.contains('active')) {
            el.classList.add('error');
            setTimeout(() => el.classList.remove('error'), 400);
        }
    }
</script>
